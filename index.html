<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Brújula</title>

<style>
body{
    margin:0;
    background:#0f0f14;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:70vh;
}

.arrow{
    width:200px;
    height:200px;
}

.debug{
    position:absolute;
    bottom:0;
    width:100%;
    background:#111;
    padding:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <div class="arrow" id="arrow">
        <svg viewBox="0 0 100 100">
            <polygon points="50,5 90,95 50,75 10,95"
                     fill="#00f7ff"/>
        </svg>
    </div>
</div>

<div class="debug" id="debug">
Esperando datos...
</div>

<script>
let currentAngle = 0;
let targetAngle = 0;

function normalizeAngle(a){
    return (a+360)%360;
}

function animate(){
    currentAngle += (targetAngle-currentAngle)*0.1;
    document.getElementById("arrow").style.transform =
        `rotate(${currentAngle}deg)`;
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

function start(){
    window.addEventListener("deviceorientationabsolute", handle, true);
    window.addEventListener("deviceorientation", handle, true);
}

function handle(event){

    let heading;
    if(event.webkitCompassHeading !== undefined){
        heading = event.webkitCompassHeading;
    } else {
        heading = event.alpha;
    }

    targetAngle = normalizeAngle(360 - heading);

    document.getElementById("debug").innerHTML = `
    alpha: ${event.alpha?.toFixed(2)}<br>
    absolute: ${event.absolute}<br>
    webkitHeading: ${event.webkitCompassHeading}<br>
    screen angle: ${screen.orientation?.angle}<br>
    final heading usado: ${heading?.toFixed(2)}
    `;
}

if(typeof DeviceOrientationEvent !== "undefined" &&
   typeof DeviceOrientationEvent.requestPermission === "function"){
    DeviceOrientationEvent.requestPermission().then(r=>{
        if(r==="granted") start();
    });
}else{
    start();
}
</script>

</body>
</html>
