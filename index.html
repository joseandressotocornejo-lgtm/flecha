<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Precisión P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f7ff; --bg: #0f111a; --card: #1c1f2e; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .setup-screen {
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            background: var(--card); border-radius: 0 0 25px 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 10;
        }
        input {
            background: #0f111a; border: 1px solid #333; color: white;
            padding: 12px; border-radius: 10px; font-size: 16px; outline: none; text-align: center;
        }
        button {
            background: var(--neon); color: black; border: none; padding: 15px;
            font-weight: bold; border-radius: 10px; cursor: pointer;
        }
        .radar-view {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .compass-circle {
            width: 280px; height: 280px; border: 2px solid rgba(0, 247, 255, 0.05);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        /* Círculos decorativos para dar profundidad */
        .compass-circle::before {
            content: ''; position: absolute; width: 70%; height: 70%;
            border: 1px dashed rgba(0, 247, 255, 0.2); border-radius: 50%;
        }
        #arrow { width: 160px; height: 160px; filter: drop-shadow(0 0 20px var(--neon)); z-index: 5; }
        .info { text-align: center; margin-top: 25px; }
        .distance { font-size: 40px; font-weight: bold; color: var(--neon); letter-spacing: -1px; }
        .status { font-size: 12px; color: #888; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="setup-screen" id="setup">
    <button id="btnSensors" onclick="startSensors()">1. CALIBRAR SENSORES</button>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="roomInput" placeholder="NOMBRE DE SALA">
        <button id="btnConnect" onclick="initNetwork()" disabled>2. RASTREAR</button>
    </div>
</div>

<div class="radar-view">
    <div class="compass-circle">
        <svg viewBox="0 0 100 100" id="arrow">
            <polygon points="50,2 95,98 50,78 5,98" fill="var(--neon)"/>
        </svg>
    </div>
    <div class="info">
        <div id="distText" class="distance">---</div>
        <div id="statusText" class="status">Esperando conexión</div>
    </div>
</div>

<script>
let peer = null, conn = null;
let myLat, myLon, remLat, remLon;
let targetAngle = 0, currentAngle = 0, lastHead = 0, bearing = 0;

async function startSensors() {
    // GPS de alta precisión
    navigator.geolocation.watchPosition(p => {
        myLat = p.coords.latitude;
        myLon = p.coords.longitude;
        updateLogic();
    }, e => alert("Error: GPS no disponible"), {enableHighAccuracy: true, maximumAge: 0});

    // Brújula con permisos
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const r = await DeviceOrientationEvent.requestPermission();
        if (r === 'granted') window.addEventListener("deviceorientation", doOrient, true);
    } else {
        window.addEventListener("deviceorientationabsolute", doOrient, true);
        window.addEventListener("deviceorientation", doOrient, true);
    }

    document.getElementById('btnSensors').innerText = "✅ SENSORES ACTIVOS";
    document.getElementById('btnSensors').disabled = true;
    document.getElementById('btnConnect').disabled = false;
}

function initNetwork() {
    const room = document.getElementById('roomInput').value.trim().toLowerCase();
    if (!room) return;
    document.getElementById('statusText').innerText = "Buscando...";

    peer = new Peer(room);
    peer.on('open', () => document.getElementById('statusText').innerText = "Esperando compañero...");
    peer.on('connection', (c) => { conn = c; setupEvents(); });
    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            peer = new Peer(); 
            peer.on('open', () => { conn = peer.connect(room); setupEvents(); });
        }
    });
}

function setupEvents() {
    conn.on('open', () => {
        document.getElementById('statusText').innerText = "¡Sincronizado!";
        document.getElementById('setup').style.display = 'none';
        setInterval(() => { if(myLat && conn.open) conn.send({lat: myLat, lon: myLon}); }, 1000);
    });
    conn.on('data', (d) => { remLat = d.lat; remLon = d.lon; updateLogic(); });
}

function doOrient(e) {
    // Obtenemos el ángulo del norte (alpha en Android, webkit en iOS)
    let head = e.webkitCompassHeading || (360 - e.alpha);
    if (head === undefined) return;

    // Filtro para suavizar el temblor de la mano
    let delta = head - lastHead;
    if (Math.abs(delta) > 180) lastHead = head;
    else lastHead += delta * 0.2;

    const screenAngle = screen.orientation?.angle || window.orientation || 0;
    
    // FÓRMULA MAESTRA:
    // (360 - lastHead) rota la flecha al norte magnético.
    // + bearing le suma el ángulo hacia el otro teléfono.
    // - screenAngle corrige si el móvil está de lado.
    targetAngle = (360 - lastHead) + bearing - screenAngle;
}

function updateLogic() {
    if (!myLat || !remLat) return;
    
    // Cálculo de Rumbo (Bearing) - Trigonometría esférica
    const lat1 = myLat * Math.PI / 180;
    const lat2 = remLat * Math.PI / 180;
    const dLon = (remLon - myLon) * Math.PI / 180;

    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

    // Cálculo de Distancia (Fórmula de Haversine)
    const R = 6371000;
    const dLat = lat2 - lat1;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    
    document.getElementById('distText').innerText = d > 1000 ? (d/1000).toFixed(1) + "km" : Math.round(d) + "m";
}

function animate() {
    let diff = targetAngle - currentAngle;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    currentAngle += diff * 0.1;
    document.getElementById("arrow").style.transform = `rotate(${currentAngle}deg)`;
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
