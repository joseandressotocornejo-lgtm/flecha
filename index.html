<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Precisión Militar</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f7ff; --bg: #05070a; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        /* Interfaz de Radar */
        .radar-screen {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            background: radial-gradient(circle, #101520 0%, #05070a 100%);
        }
        /* Rejilla de radar */
        .grid {
            position: absolute; width: 320px; height: 320px;
            border: 1px solid rgba(0, 247, 255, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .grid::before {
            content: ''; position: absolute; width: 66%; height: 66%;
            border: 1px solid rgba(0, 247, 255, 0.1); border-radius: 50%;
        }
        #arrow {
            width: 120px; height: 120px; z-index: 10;
            filter: drop-shadow(0 0 15px var(--neon));
            will-change: transform;
        }
        /* Capa de configuración */
        .overlay {
            position: absolute; inset: 0; background: rgba(5,7,10,0.95);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }
        .card {
            background: #10141b; border: 1px solid var(--neon);
            padding: 30px; border-radius: 15px; width: 100%; max-width: 300px;
        }
        input {
            width: 100%; background: #000; border: 1px solid #333;
            color: var(--neon); padding: 12px; margin: 15px 0;
            border-radius: 5px; text-align: center; font-size: 18px; box-sizing: border-box;
        }
        button {
            width: 100%; background: var(--neon); color: #000;
            border: none; padding: 15px; font-weight: bold; border-radius: 5px;
            cursor: pointer; text-transform: uppercase;
        }
        .data-panel {
            padding: 15px; background: #0a0e14; border-top: 1px solid #1a202a;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 10px;
        }
        .val { color: var(--neon); font-size: 14px; display: block; }
    </style>
</head>
<body>

<div id="overlay" class="overlay">
    <div class="card">
        <h2 style="margin:0 0 10px 0; font-size: 14px; color: var(--neon);">SISTEMA DE RASTREO</h2>
        <button onclick="setupSystem()">1. INICIALIZAR SENSORES</button>
        <input type="text" id="room" placeholder="CÓDIGO DE SALA">
        <button id="btnConn" onclick="connect()" disabled style="opacity:0.3;">2. ENLAZAR RADAR</button>
    </div>
</div>

<div class="radar-screen">
    <div class="grid"></div>
    <svg viewBox="0 0 100 100" id="arrow">
        <path d="M50 0 L95 100 L50 80 L5 100 Z" fill="var(--neon)"/>
    </svg>
</div>

<div class="data-panel">
    <div>DISTANCIA: <span id="dist" class="val">0.0 m</span></div>
    <div>MARGEN ERROR: <span id="acc" class="val">--</span></div>
    <div>RUMBO OBJ: <span id="bear" class="val">0°</span></div>
    <div>MI ORIENTACIÓN: <span id="head" class="val">0°</span></div>
</div>

<script>
let peer, conn;
let myLat = 0, myLon = 0, targetLat = 0, targetLon = 0;
let bearing = 0, filteredHeading = 0, currentArrowRotation = 0;

// Configuración de Filtro Exponencial (Suavizado extremo)
const ALPHA = 0.15; 

async function setupSystem() {
    // GPS de frecuencia ultra-alta
    navigator.geolocation.watchPosition(p => {
        myLat = p.coords.latitude;
        myLon = p.coords.longitude;
        document.getElementById('acc').innerText = p.coords.accuracy.toFixed(1) + "m";
        if (conn && conn.open) sendLoc();
        calculateEverything();
    }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });

    // Sensores con soporte absoluto (Chrome/Android/iOS)
    if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') window.addEventListener('deviceorientation', onRotate);
        } else {
            window.addEventListener('deviceorientationabsolute', onRotate);
            window.addEventListener('deviceorientation', onRotate);
        }
    }
    document.getElementById('btnConn').disabled = false;
    document.getElementById('btnConn').style.opacity = 1;
}

function onRotate(e) {
    let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
    if (!rawHeading) return;

    // --- FILTRO DE COMPLEMENTARIEDAD ---
    // Evita el salto de 360 a 0
    let diff = rawHeading - filteredHeading;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    
    filteredHeading += (diff * ALPHA);
    document.getElementById('head').innerText = Math.round(filteredHeading) + "°";
    
    updateArrow();
}

function connect() {
    const room = document.getElementById('room').value.trim().toLowerCase();
    peer = new Peer(room);
    
    peer.on('open', () => document.getElementById('btnConn').innerText = "ESPERANDO...");
    peer.on('connection', c => { conn = c; initEvents(); });
    peer.on('error', err => {
        if (err.type === 'unavailable-id') {
            peer = new Peer();
            peer.on('open', () => { conn = peer.connect(room); initEvents(); });
        }
    });
}

function initEvents() {
    conn.on('open', () => {
        document.getElementById('overlay').style.display = 'none';
        setInterval(sendLoc, 1000); // Latido de ubicación
    });
    conn.on('data', d => {
        targetLat = d.lat; targetLon = d.lon;
        calculateEverything();
    });
}

function sendLoc() {
    if (myLat && conn.open) conn.send({ lat: myLat, lon: myLon });
}

function calculateEverything() {
    if (!myLat || !targetLat) return;

    const lat1 = myLat * Math.PI / 180;
    const lat2 = targetLat * Math.PI / 180;
    const dLon = (targetLon - myLon) * Math.PI / 180;

    // Rumbo (Bearing)
    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
    bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    document.getElementById('bear').innerText = Math.round(bearing) + "°";

    // Distancia
    const R = 6371000;
    const a = Math.sin((lat2-lat1)/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
    const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    document.getElementById('dist').innerText = d > 1000 ? (d/1000).toFixed(2) + " km" : d.toFixed(1) + " m";
}

function updateArrow() {
    // Cálculo final compensado
    let targetRotation = (360 - filteredHeading) + bearing;
    
    // Suavizado de animación para que parezca una aguja real
    let diff = targetRotation - currentArrowRotation;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    
    currentArrowRotation += diff * 0.2;
    document.getElementById('arrow').style.transform = `rotate(${currentArrowRotation}deg)`;
}
</script>
</body>
</html>
