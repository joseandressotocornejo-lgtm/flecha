<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brújula de Objetivos</title>

<style>
body {
    margin: 0;
    background: #0f0f14;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Botón menú */
.menu-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 28px;
    background: none;
    border: none;
    color: #333;
    z-index: 10;
}

/* Menú lateral */
.menu {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: #ffffff;
    box-shadow: 2px 0 20px rgba(0,0,0,0.2);
    padding-top: 80px;
    transition: 0.3s ease;
}

.menu.active {
    left: 0;
}

.menu button {
    display: block;
    width: 80%;
    margin: 15px auto;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #e6e6e6;
    font-size: 16px;
    cursor: pointer;
}

.menu button:hover {
    background: #d4d4d4;
}

/* Contenedor brújula */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Flecha neón */
.arrow {
    width: 200px;
    height: 200px;
    transition: filter 0.2s ease;
}

svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px #00f7ff)
            drop-shadow(0 0 20px #00f7ff)
            drop-shadow(0 0 40px #00f7ff);
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">
    <button>Lugares</button>
    <button>Personas</button>
    <button onclick="requestPermissions()">Permisos</button>
</div>

<div class="container">
    <div class="arrow" id="arrow">
        <svg viewBox="0 0 100 100">
            <polygon points="50,5 90,95 50,75 10,95"
                     fill="#00f7ff"/>
        </svg>
    </div>
</div>

<script>
let currentAngle = 0;
let targetAngle = 0;
let smoothingFactor = 0.08;

function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

function normalizeAngle(angle){
    return (angle + 360) % 360;
}

function shortestAngleDiff(a,b){
    let diff = b - a;
    if(diff > 180) diff -= 360;
    if(diff < -180) diff += 360;
    return diff;
}

function animate(){
    let diff = shortestAngleDiff(currentAngle, targetAngle);

    if(Math.abs(diff) < 0.2){
        diff = 0;
        document.querySelector("svg").style.filter =
            "drop-shadow(0 0 20px #00f7ff) drop-shadow(0 0 60px #00f7ff)";
    } else {
        document.querySelector("svg").style.filter =
            "drop-shadow(0 0 10px #00f7ff) drop-shadow(0 0 30px #00f7ff)";
    }

    currentAngle += diff * smoothingFactor;
    currentAngle = normalizeAngle(currentAngle);

    document.getElementById("arrow").style.transform =
        `rotate(${currentAngle}deg)`;

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

function requestPermissions(){
    if(typeof DeviceOrientationEvent !== "undefined" &&
       typeof DeviceOrientationEvent.requestPermission === "function"){

        DeviceOrientationEvent.requestPermission()
        .then(response => {
            if(response === "granted"){
                startCompass();
            }
        })
        .catch(console.error);

    } else {
        startCompass();
    }

    navigator.geolocation.getCurrentPosition(()=>{},()=>{});
}

function startCompass(){
    window.addEventListener("deviceorientation", (event)=>{
        if(event.alpha !== null){
            targetAngle = 360 - event.alpha;
        }
    });
}
</script>

</body>
</html>
