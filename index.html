<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brújula de Destino Pro</title>
    <style>
        :root {
            --neon: #00f7ff;
            --bg: #0f0f14;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Panel Superior */
        .controls {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-bottom: 1px solid #333;
            z-index: 10;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            background: #1a1a20;
            border: 1px solid #444;
            color: var(--neon);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: var(--neon); }

        button {
            width: 100%;
            background: var(--neon);
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 247, 255, 0.2);
        }

        button:active { transform: scale(0.98); }

        /* Contenedor Visual */
        .viewport {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .arrow-wrapper {
            width: 280px;
            height: 280px;
            position: relative;
            transition: opacity 0.5s;
        }

        .arrow {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 247, 255, 0.3));
        }

        /* Información de Distancia */
        .distance-display {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
        }

        /* Debug Inferior */
        .debug-panel {
            background: #000;
            padding: 15px;
            font-size: 11px;
            font-family: monospace;
            border-top: 1px solid #222;
            color: #777;
        }

        .highlight { color: #aaa; }
    </style>
</head>
<body>

<div class="controls">
    <div class="input-group">
        <input type="number" id="latDest" placeholder="Latitud Destino" step="any">
        <input type="number" id="lonDest" placeholder="Longitud Destino" step="any">
    </div>
    <button onclick="initApp()">Activar Sensores y GPS</button>
</div>

<div class="viewport">
    <div class="arrow-wrapper" id="arrow">
        <svg viewBox="0 0 100 100" class="arrow">
            <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#00f7ff;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
                </linearGradient>
            </defs>
            <polygon points="50,5 95,95 50,75 5,95" fill="url(#grad)"/>
        </svg>
    </div>
    <div class="distance-display" id="distance">---</div>
</div>

<div class="debug-panel" id="debug">
    Toque el botón para iniciar...
</div>

<script>
let currentAngle = 0;
let targetAngle = 0;
let lastHeading = 0;

let myLat = null, myLon = null;
let destLat = null, destLon = null;
let bearingToTarget = 0;

// Configuración del filtro (0.1 = muy estable/lento, 0.5 = rápido/nervioso)
const SMOOTH_FACTOR = 0.15; 

function getBearing(lat1, lon1, lat2, lon2) {
    const φ1 = lat1 * Math.PI / 180;
    const φ2 = lat2 * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const y = Math.sin(Δλ) * Math.cos(φ2);
    const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Radio Tierra en km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const d = R * c;
    return d > 1 ? d.toFixed(2) + " km" : (d * 1000).toFixed(0) + " m";
}

function animate() {
    let diff = targetAngle - currentAngle;
    
    // Evitar rotación completa al cruzar 0/360
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    
    // Suavizado de la animación de la flecha
    currentAngle += diff * 0.08; 
    document.getElementById("arrow").style.transform = `rotate(${currentAngle}deg)`;
    requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

function handleOrientation(event) {
    let rawHeading = 0;
    
    if (event.webkitCompassHeading !== undefined) {
        rawHeading = event.webkitCompassHeading; // iOS
    } else if (event.alpha !== null) {
        rawHeading = 360 - event.alpha; // Android
    } else {
        return;
    }

    // APLICACIÓN DEL FILTRO DE PASO BAJO (Estabilización)
    // Si el cambio es muy brusco (salto de 360), no filtramos para no romper la lógica
    let delta = rawHeading - lastHeading;
    if (Math.abs(delta) > 180) {
        lastHeading = rawHeading;
    } else {
        lastHeading = lastHeading + (delta * SMOOTH_FACTOR);
    }

    const screenAngle = screen.orientation?.angle || 0;
    
    // La brújula apunta al Norte (360 - lastHeading) 
    // y luego se le suma el ángulo hacia el objetivo
    targetAngle = (360 - lastHeading) + bearingToTarget - screenAngle;

    document.getElementById("debug").innerHTML = `
        Orientación: ${lastHeading.toFixed(1)}° | 
        Hacia Objetivo: ${bearingToTarget.toFixed(1)}°
    `;
}

async function initApp() {
    destLat = parseFloat(document.getElementById('latDest').value);
    destLon = parseFloat(document.getElementById('lonDest').value);

    // Activar GPS
    navigator.geolocation.watchPosition(pos => {
        myLat = pos.coords.latitude;
        myLon = pos.coords.longitude;
        
        if (!isNaN(destLat) && !isNaN(destLon)) {
            bearingToTarget = getBearing(myLat, myLon, destLat, destLon);
            document.getElementById("distance").innerText = getDistance(myLat, myLon, destLat, destLon);
        } else {
            bearingToTarget = 0; // Si no hay destino, apunta al Norte
            document.getElementById("distance").innerText = "MODO NORTE";
        }
    }, err => {
        document.getElementById("debug").innerText = "Error GPS: " + err.message;
    }, { enableHighAccuracy: true });

    // Activar Sensores
    if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === "granted") {
                window.addEventListener("deviceorientationabsolute", handleOrientation, true);
            }
        } catch (e) { alert("Error de permisos"); }
    } else {
        window.addEventListener("deviceorientationabsolute", handleOrientation, true);
        window.addEventListener("deviceorientation", handleOrientation, true);
    }
    
    document.querySelector('button').innerText = "SISTEMA ACTIVO";
    document.querySelector('button').style.background = "#222";
    document.querySelector('button').style.color = var(--neon);
}
</script>

</body>
</html>
